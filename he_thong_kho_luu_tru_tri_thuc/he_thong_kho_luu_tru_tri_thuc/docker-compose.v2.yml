services:
  mysql:
    image: mysql:8.4
    container_name: eduvault-v2-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: eduvault
      MYSQL_USER: eduvault
      MYSQL_PASSWORD: change-me
      MYSQL_ROOT_PASSWORD: change-root-me
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max-allowed-packet=512M
      - --binlog-expire-logs-seconds=604800
    ports:
      - "3307:3306"
    volumes:
      - eduvault_v2_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pchange-root-me"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: eduvault-v2-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: eduvault
      MINIO_ROOT_PASSWORD: eduvault-demo-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - eduvault_v2_minio:/data

  redis:
    image: redis:7-alpine
    container_name: eduvault-v2-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - eduvault_v2_redis:/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: eduvault-v2-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - eduvault_v2_qdrant:/qdrant/storage

volumes:
  eduvault_v2_mysql:
  eduvault_v2_minio:
  eduvault_v2_redis:
  eduvault_v2_qdrant:
